# Included by every location block. nginx does NOT inherit add_header from an
# outer block once the inner block declares one of its own, so defining these
# at server level would silently drop them wherever a Cache-Control header is
# set. Including the snippet everywhere is the documented way around that.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "no-referrer" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; base-uri 'none'; frame-ancestors 'none'" always;

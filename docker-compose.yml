services:
  backend:
    build: ./backend
    environment:
      PORT: "8080"
      # The browser only ever talks to nginx, so cross-origin requests to the
      # API are never legitimate in this topology; keep the allowlist empty of
      # real origins rather than echoing one.
      CORS_ORIGIN: "http://localhost:3000"
    # No published port: the backend is reachable only from the compose
    # network, so nginx is the single entry point.
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "/server", "-healthcheck"]
      interval: 10s
      timeout: 3s
      start_period: 2s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

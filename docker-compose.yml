# FRONTEND_PORT overrides the host port nginx is published on (default 3000)
# — set it in the environment or a .env file next to this one, e.g.
# `FRONTEND_PORT=8080 docker compose up`. CORS_ORIGIN tracks the same
# variable below so the two never drift out of sync.
services:
  backend:
    build: ./backend
    environment:
      PORT: "8080"
      # The browser only ever talks to nginx, so cross-origin requests to the
      # API are never legitimate in this topology; keep the allowlist a
      # single real origin — the frontend's own published port — rather than
      # echoing an arbitrary one.
      CORS_ORIGIN: "http://localhost:${FRONTEND_PORT:-3000}"
      RATE_LIMIT_PER_MINUTE: "60"
      RATE_LIMIT_BURST: "20"
      # nginx overwrites X-Real-IP before forwarding to the private backend.
      TRUST_PROXY: "true"
    # No published port: the backend is reachable only from the compose
    # network, so nginx is the single entry point.
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "/server", "-healthcheck"]
      interval: 10s
      timeout: 3s
      start_period: 2s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
